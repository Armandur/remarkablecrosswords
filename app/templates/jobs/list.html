{% extends "base.html" %}
{% block content %}
<h1 class="mb-4">Loggar (Jobb)</h1>

<form method="get" action="/jobs" class="card shadow-sm mb-4">
    <div class="card-body py-3">
        <div class="row g-2 align-items-end">
            <div class="col-auto">
                <label class="form-label text-muted small mb-1">Status</label>
                <select name="state" class="form-select form-select-sm">
                    <option value="" {% if not filter_state %}selected{% endif %}>Alla</option>
                    <option value="running" {% if filter_state == 'running' %}selected{% endif %}>Körs</option>
                    <option value="done" {% if filter_state == 'done' %}selected{% endif %}>Lyckades</option>
                    <option value="failed" {% if filter_state == 'failed' %}selected{% endif %}>Misslyckades</option>
                </select>
            </div>
            <div class="col-auto">
                <label class="form-label text-muted small mb-1">Typ</label>
                <select name="kind" class="form-select form-select-sm">
                    <option value="" {% if not filter_kind %}selected{% endif %}>Alla</option>
                    <option value="download" {% if filter_kind == 'download' %}selected{% endif %}>download</option>
                    <option value="sync" {% if filter_kind == 'sync' %}selected{% endif %}>sync</option>
                    <option value="rerender" {% if filter_kind == 'rerender' %}selected{% endif %}>rerender</option>
                    <option value="notify" {% if filter_kind == 'notify' %}selected{% endif %}>notify</option>
                </select>
            </div>
            <div class="col">
                <label class="form-label text-muted small mb-1">Sök i logg</label>
                <input type="text" name="q" value="{{ filter_q }}" class="form-control form-control-sm" placeholder="Fritext...">
            </div>
            <div class="col-auto d-flex gap-2">
                <button type="submit" class="btn btn-sm btn-primary">Filtrera</button>
                {% if filter_state or filter_kind or filter_q %}
                <a href="/jobs" class="btn btn-sm btn-outline-secondary">Rensa</a>
                {% endif %}
            </div>
        </div>
    </div>
</form>

<div class="card shadow-sm mb-2 overflow-hidden">
    <div class="card-header bg-white d-flex justify-content-between align-items-center">
        <span class="fw-semibold">Jobb</span>
        <form action="/jobs/clear" method="POST"
              onsubmit="return confirm('Ta bort alla avslutade och misslyckade jobb?')">
            <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
            <button type="submit" class="btn btn-sm btn-outline-danger">Rensa avslutade</button>
        </form>
    </div>
    <div class="card-body p-0">
        <div class="table-responsive">
            <table class="table table-hover mb-0">
                <thead class="table-light">
                    <tr>
                        <th>ID</th>
                        <th>Typ</th>
                        <th>Status</th>
                        <th>Startad</th>
                        <th>Färdig</th>
                        <th class="text-end">Åtgärd</th>
                    </tr>
                </thead>
                <tbody id="jobs-tbody">
                    <tr><td colspan="6" class="text-center text-muted py-4">Laddar...</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<div id="jobs-pagination" class="mt-2"></div>
{% endblock %}
{% block scripts %}
<script>
(function () {
    const params = new URLSearchParams(window.location.search);
    let offset = parseInt(params.get('offset') || '0');
    const state = params.get('state') || '';
    const kind = params.get('kind') || '';
    const q = params.get('q') || '';
    let limit = 20;
    let total = 0;
    const tbody = document.getElementById('jobs-tbody');
    const paginEl = document.getElementById('jobs-pagination');

    function calcLimit() {
        const top = tbody.getBoundingClientRect().top;
        return Math.max(5, Math.floor((window.innerHeight - top - 80) / 47));
    }

    function stateBadge(s) {
        if (s === 'done') return '<span class="badge bg-success">Lyckades</span>';
        if (s === 'failed') return '<span class="badge bg-danger">Misslyckades</span>';
        if (s === 'running') return '<span class="badge bg-warning text-dark">Körs</span>';
        return `<span class="badge bg-secondary">${s}</span>`;
    }

    function formatDt(iso) {
        return iso ? new Date(iso).toLocaleString('sv-SE') : '-';
    }

    function renderPagination() {
        if (total <= limit) { paginEl.innerHTML = ''; return; }
        const from = offset + 1, to = Math.min(offset + limit, total);
        const prevDisabled = offset === 0;
        const nextDisabled = offset + limit >= total;
        paginEl.innerHTML = `<nav><ul class="pagination justify-content-center mb-0">
            <li class="page-item ${prevDisabled ? 'disabled' : ''}">
                <button class="page-link" onclick="jobsGoTo(${Math.max(0, offset - limit)})" ${prevDisabled ? 'disabled' : ''}>Föregående</button>
            </li>
            <li class="page-item disabled"><span class="page-link text-dark">${from}–${to} av ${total}</span></li>
            <li class="page-item ${nextDisabled ? 'disabled' : ''}">
                <button class="page-link" onclick="jobsGoTo(${offset + limit})" ${nextDisabled ? 'disabled' : ''}>Nästa</button>
            </li>
        </ul></nav>`;
    }

    async function load() {
        const newLimit = calcLimit();
        if (newLimit !== limit) { limit = newLimit; offset = 0; }
        try {
            const url = `/jobs/page?offset=${offset}&limit=${limit}&state=${encodeURIComponent(state)}&kind=${encodeURIComponent(kind)}&q=${encodeURIComponent(q)}`;
            const r = await fetch(url);
            if (!r.ok) return;
            const data = await r.json();
            total = data.total;
            tbody.innerHTML = data.jobs.length === 0
                ? '<tr><td colspan="6" class="text-center text-muted py-4">Inga jobb hittades</td></tr>'
                : data.jobs.map(j => `<tr>
                    <td class="align-middle"><code>#${j.id}</code></td>
                    <td class="align-middle">${j.kind}</td>
                    <td class="align-middle">${stateBadge(j.state)}</td>
                    <td class="align-middle text-muted small">${formatDt(j.started_at)}</td>
                    <td class="align-middle text-muted small">${formatDt(j.finished_at)}</td>
                    <td class="text-end align-middle"><a href="/jobs/${j.id}" class="btn btn-sm btn-outline-secondary">Detaljer</a></td>
                </tr>`).join('');
            renderPagination();
        } catch(e) {}
    }

    window.jobsGoTo = function(off) { offset = off; load(); };

    let resizeTimer;
    window.addEventListener('resize', function () {
        clearTimeout(resizeTimer);
        resizeTimer = setTimeout(load, 200);
    });

    load();
    setInterval(load, 4000);
})();
</script>
{% endblock %}
