{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-6" style="max-width: 400px;">
        <div class="card shadow">
            <div class="card-body">
                <h2 class="card-title text-center mb-4">Logga in</h2>
                <div id="error" class="alert alert-danger" style="display: none;"></div>
                <form onsubmit="doLogin(event)">
                    <div class="mb-3">
                        <label for="username" class="form-label">Användarnamn</label>
                        <input type="text" id="username" class="form-control" required autocomplete="username">
                    </div>
                    
                    <div class="mb-3">
                        <label for="password" class="form-label">Lösenord</label>
                        <input type="password" id="password" class="form-control" required autocomplete="current-password">
                    </div>
                    
                    <div class="d-grid">
                        <button type="submit" class="btn btn-primary">Logga in</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<script>
async function doLogin(e) {
    e.preventDefault();
    const errorEl = document.getElementById('error');
    errorEl.style.display = 'none';
    
    const body = {
        username: document.getElementById('username').value,
        password: document.getElementById('password').value
    };
    
    try {
        const resp = await fetch('/api/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(body)
        });
        
        if (resp.ok) {
            window.location.href = '/';
        } else {
            const data = await resp.json();
            errorEl.innerText = data.detail || 'Inloggning misslyckades';
            errorEl.style.display = 'block';
        }
    } catch (err) {
        errorEl.innerText = 'Ett nätverksfel uppstod';
        errorEl.style.display = 'block';
    }
}
// Dölj nav vid login
const nav = document.querySelector('nav');
if (nav) nav.style.display = 'none';
</script>
{% endblock %}
