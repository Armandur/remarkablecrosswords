<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>remarkablecrosswords</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
        <div class="container">
            <a class="navbar-brand" href="/">reMarkable Crosswords</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="/">Dashboard</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/sources">Källor</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/crosswords">Korsord</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/jobs">Loggar</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/settings">Inställningar</a>
                    </li>
                </ul>
                <div class="navbar-nav">
                    <a class="nav-link" href="#" onclick="logout()">Logga ut</a>
                </div>
            </div>
        </div>
    </nav>
    <main class="container">
        {% block content %}{% endblock %}
    </main>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        async function logout() {
            const resp = await fetch('/api/logout', { method: 'POST' });
            if (resp.ok) window.location.href = '/login';
        }
    </script>
</body>
</html>
